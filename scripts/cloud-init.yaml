#cloud-config
users:
  - name: {{VM_USER}}
    groups: sudo
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    lock_passwd: true

package_update: true
package_upgrade: true

packages:
  - git
  - wget
  - curl
  - vim
  - btop
  - fzf
  - tmux
  - nvtop
  - tree
  - ubuntu-drivers-common

write_files:
  - path: /etc/sysctl.d/99-swappiness.conf
    content: |
      vm.swappiness=10
  - path: /etc/ssh/sshd_config.d/99-custom.conf
    content: |
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      PubkeyAuthentication yes
      PermitRootLogin no

runcmd:
  - ubuntu-drivers autoinstall >> /var/log/gpu-driver-install.log 2>&1
  - sysctl -p /etc/sysctl.d/99-swappiness.conf
  - curl -LsSf https://astral.sh/uv/install.sh | sudo -u {{VM_USER}} sh
  - echo 'source /usr/share/doc/fzf/examples/key-bindings.bash' >> /home/{{VM_USER}}/.bashrc
  - chown {{VM_USER}}:{{VM_USER}} /home/{{VM_USER}}/.bashrc
  - systemctl reload ssh